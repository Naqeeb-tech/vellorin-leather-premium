<style>
.shop-wrapper {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 24px;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 40px;
}

@media (max-width: 768px) {
    .shop-wrapper { grid-template-columns: 1fr; }
    .filter-sidebar { display: none; } /* Simplified for responsive viewports */
}

.filter-title {
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
}

.filter-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.filter-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 8px 0;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: color 0.2s;
}

.filter-btn:hover, .filter-btn.active {
    color: var(--bg-dark);
    font-weight: 600;
}

/* Product Grid */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 32px;
}

.product-card {
    background: #ffffff;
    border: 1px solid transparent;
    transition: all 0.3s ease;
}

.product-image-container {
    position: relative;
    background: #f5f5f5;
    aspect-ratio: 1 / 1;
    overflow: hidden;
}

.product-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.product-card:hover .product-image {
    transform: scale(1.05);
}

.add-to-cart-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(17, 17, 17, 0.9);
    color: #fff;
    border: none;
    padding: 14px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transform: translateY(100%);
    transition: transform 0.3s ease;
}

.product-card:hover .add-to-cart-overlay {
    transform: translateY(0);
}

.product-info {
    padding: 16px 0;
    text-align: center;
}

.product-name {
    margin: 0 0 6px 0;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.5px;
}

.product-price {
    margin: 0;
    color: var(--accent-gold);
    font-weight: 600;
    font-size: 14px;
}
</style>
